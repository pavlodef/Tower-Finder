services:
  tower-finder:
    build: .
    ports:
      - "80:80"
    env_file:
      - backend/.env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost/api/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
